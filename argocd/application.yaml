apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pulumi-argo-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/guineveresaenger/pulumi-argo-demo.git
    targetRevision: HEAD
    path: app
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

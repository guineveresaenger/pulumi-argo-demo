apiVersion: v1
kind: ServiceAccount
metadata:
  name: pulumi-argo-demo
  namespace: demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pulumi-argo-demo:system:auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: pulumi-argo-demo
    namespace: demo
